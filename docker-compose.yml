services:
  mysqldb:
    image: mysql:8.0.31-oracle
    restart: unless-stopped
    env_file: ./.env
    environment:
      - MYSQL_ROOT_PASSWORD=$MYSQLDB_ROOT_PASSWORD
      - MYSQL_DATABASE=$MYSQLDB_DATABASE
    ports:
      - $MYSQLDB_LOCAL_PORT:$MYSQLDB_DOCKER_PORT
    volumes:
      - db:/var/lib/mysql

  python-api:
    build: ./python-api
    restart: unless-stopped
    ports:
      - "5000:5000"

volumes:
  db:
  postgres-data:
