<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error en el Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">

                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0" th:text="${tituloError}">Error Desconocido</h4>
                </div>

                <div class="card-body p-4 text-center">
                    <h5 class="text-muted mb-4" th:text="${mensajeError}">Ha ocurrido un problema en el sistema.</h5>

                    <button class="btn btn-outline-secondary btn-sm mb-3" type="button" data-bs-toggle="collapse" data-bs-target="#detalleError" aria-expanded="false" aria-controls="detalleError">
                        Ver detalles técnicos
                    </button>

                    <div class="collapse" id="detalleError">
                        <div class="card card-body bg-dark text-warning text-start mb-3" style="font-family: monospace; font-size: 0.85em;">
                            <span th:text="${detalleTecnico}">Detalle técnico no disponible.</span>
                        </div>
                    </div>

                    <hr>
                    <a th:href="@{/}" class="btn btn-primary px-4">Volver al Inicio</a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
