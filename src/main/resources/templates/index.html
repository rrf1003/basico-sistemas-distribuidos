<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Sistemas Distribuidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <h1 class="display-4 text-primary mb-4">Bienvenido a la Práctica 2</h1>
    <p class="lead text-secondary mb-5">Sistema de Gestión de Excepciones e Integración con Python</p>

    <div class="row justify-content-center gap-3">
        <div class="col-md-4">
            <div class="card shadow-sm py-4">
                <h4>Acceso Seguro</h4>
                <p class="text-muted">Inicia sesión en el sistema</p>
                <a th:href="@{/login}" class="btn btn-outline-primary w-50 mx-auto">Ir al Login</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm py-4">
                <h4>Simulación API</h4>
                <p class="text-muted">Prueba de excepciones con Python</p>
                <a th:href="@{/api-test}" class="btn btn-outline-success w-50 mx-auto">Probar API</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
